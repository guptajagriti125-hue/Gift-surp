<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choose Your Gift ❤️</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <!-- Password Box -->
    <div id="loginBox" class="box">

        <h1>🎁 Surprise Gift 🎁</h1>

        <p>Enter Password</p>

        <input
        type="password"
        id="password"
        placeholder="Password">

        <button onclick="checkPassword()">
            Unlock
        </button>

        <p id="error"></p>

    </div>



    <!-- Gift Selection -->
    <div id="giftBox" class="hidden">

        <h1>Choose ONLY One Gift ❤️</h1>

        <div class="cards">

            <div class="card" onclick="selectGift('👗 Dress from SHEIN')">

                <h2>👗</h2>

                <h3>Dress from SHEIN</h3>

            </div>

            <div class="card" onclick="selectGift('🎁 Secret Gift (Amazon)')">

                <h2>🎁</h2>

                <h3>Secret Gift (Amazon)</h3>

            </div>

            <div class="card" onclick="selectGift('❤️ Solo Date')">

                <h2>❤️</h2>

                <h3>Solo Date</h3>

            </div>

        </div>

    </div>



    <!-- Final Screen -->

    <div id="resultBox" class="hidden">

        <h1>🎉 Choice Confirmed 🎉</h1>

        <p id="selectedGift"></p>

        <p class="small">
            Your choice has been locked ❤️
        </p>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
